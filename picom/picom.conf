# ----------------------------------
# PERFORMANCE & BACKEND
# ----------------------------------
# Use OpenGL for hardware acceleration (saves CPU)
backend = "glx";
glx-no-stencil = true;
glx-copy-from-front = false;
vsync = true; # Prevents screen tearing

# ----------------------------------
# SHADOWS (Depth & Floating Effect)
# ----------------------------------
shadow = true;
shadow-radius = 14;
shadow-opacity = 0.4;
shadow-offset-x = -14;
shadow-offset-y = -14;

# Exclude Polybar and hidden i3 elements from having shadows
shadow-exclude = [
  "class_g = 'Polybar'",
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g ?= 'Notify-osd'",
  "_GTK_FRAME_EXTENTS@:c"
];

# ----------------------------------
# BLUR (The Frosted Glass)
# ----------------------------------
blur-method = "dual_kawase";
blur-strength = 6; # Adjust between 4 and 8 depending on preference
blur-background = true;

blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'Polybar'",
  "_GTK_FRAME_EXTENTS@:c"
];

# ----------------------------------
# ANIMATIONS & CORNERS
# ----------------------------------
# Very fast fades so it feels snappy, not sluggish
fading = true;
fade-delta = 3;
fade-in-step = 0.03;
fade-out-step = 0.03;

# Match the radius to your Polybar pill shape
corner-radius = 8;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

# ----------------------------------
# OPACITY RULES
# ----------------------------------
# Keeps active windows 100% opaque, dims inactive ones slightly for focus
active-opacity = 1.0;
inactive-opacity = 0.95;
