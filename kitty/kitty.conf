# --- SHELL CONFIGURATION ---
shell /bin/zsh
editor nvim

# --- FONTS (Use a Nerd Font for icons) ---
# You can list available fonts with: kitty +list-fonts
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# --- BACKGROUND IMAGE SETTINGS ---
# 1. The path to your image
background_image /home/phuc/.config/kitty/wallpaper.png

# 2. Layout: 'tiled', 'mirror-tiled', 'scaled', 'clamped'
# 'scaled' stretches it to fit the window (best for wallpapers)
background_image_layout scaled

# 3. THE MAGIC TRICK: Background Tint
# This darkens the image so you can actually read your code!
# 0.0 = Show original image (too bright)
# 0.9 = Make it 90% dark (perfect for coding)
background_tint 0.95

# --- WINDOW LAYOUT ---
# Adds a little "breathing room" around the text
window_padding_width 10
hide_window_decorations no # Set to 'yes' if you want to remove the title bar
remember_window_size  yes
initial_window_width  1000
initial_window_height 650

# --- CURSOR ---
cursor_shape block
cursor_blink_interval 0.5
cursor_stop_blinking_after 0

# --- TAB BAR (Chrome-style tabs) ---
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted

# --- COLORS (Catppuccin Mocha - Matching your Neovim!) ---
foreground              #CDD6F4
background              #1E1E2E
selection_foreground    #1E1E2E
selection_background    #F5E0DC

# Cursor colors
cursor                  #F5E0DC
cursor_text_color       #1E1E2E

# URL underline color when hovering with mouse
url_color               #F5E0DC

# Kitty window border colors
active_border_color     #B4BEFE
inactive_border_color   #6C7086
bell_border_color       #F9E2AF

# Tab bar colors
active_tab_foreground   #11111B
active_tab_background   #CBA6F7
inactive_tab_foreground #CDD6F4
inactive_tab_background #181825
tab_bar_background      #11111B
