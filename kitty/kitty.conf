# --- SHELL CONFIGURATION ---
shell /bin/zsh
editor nvim

# --- FONTS ---
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0
# Slightly increase line height for easier reading
modify_font line_height 110%

# --- UI & LAYOUT ---
window_padding_width 15
hide_window_decorations yes
remember_window_size  yes
initial_window_width  1000
initial_window_height 650

# --- CURSOR ---
cursor_shape block
# Set to 0 to stop the blinking (reduces cognitive load)
cursor_blink_interval 0 

# --- TAB BAR ---
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted

# --- COLORS (Material Dark) ---
# Deep charcoal background prevents halation (text blooming)
background              #121212
foreground              #EEFFFF

# Subtle selections that don't blind you
selection_foreground    #FFFFFF
selection_background    #424242

# Warm, visible cursor
cursor                  #FFCB6B
cursor_text_color       #121212
url_color               #82AAFF

# Kitty window borders
active_border_color     #424242
inactive_border_color   #212121
bell_border_color       #FF5370

# Tab bar
active_tab_foreground   #EEFFFF
active_tab_background   #424242
inactive_tab_foreground #B0BEC5
inactive_tab_background #212121
tab_bar_background      #121212

# --- SPLITS & FOCUS ---
enabled_layouts  grid, stack, splits
# Thinner borders
window_border_width     1.0
# Dim inactive panes heavily to maintain focus on the active code
inactive_text_alpha     0.6


map ctrl+shift+enter launch --cwd=current
map ctrl+shift+t launch --type=tab --cwd=current
